<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>裂隙回响</title>
    <style>
        /* ==================== 全局基础样式 ==================== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#000; min-height:100vh; display:flex; justify-content:center; align-items:center;
            font-family:'Press Start 2P',monospace; padding:0; image-rendering:pixelated;
            -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; overflow:hidden;
        }

        /* ==================== CRT 显示器外壳 ==================== */
        .crt-monitor {
            background:#0b0b12; border:8px solid #3d3d4a; border-radius:0;
            box-shadow:inset 0 0 40px rgba(0,0,0,0.85); padding:8px 8px 6px; position:relative;
            outline:2px solid #5a5a6e; outline-offset:1px; image-rendering:pixelated;
            width:100vw; height:100vh; display:flex; flex-direction:column; transition: filter 0.5s;
        }
        .crt-monitor::after {
            content:""; position:absolute; top:0; left:0; width:100%; height:100%;
            background:repeating-linear-gradient(0deg,rgba(0,0,0,0.1) 0px,rgba(0,0,0,0.1) 2px,transparent 2px,transparent 4px);
            pointer-events:none; z-index:10;
        }
        .crt-monitor.mirrored .board-container,.crt-monitor.mirrored .hud,.crt-monitor.mirrored .item-belt,.crt-monitor.mirrored .passive-bar { transform: scaleX(-1); }
        .crt-monitor.filtered { filter: sepia(0.6) hue-rotate(-80deg); }

        /* ==================== 屏幕内部容器 ==================== */
        .screen-inner {
            position:relative; background:#12101c; border:3px solid #4a4a5c; border-radius:2px;
            padding:10px 8px 6px; display:flex; flex-direction:column; align-items:center; gap:6px;
            box-shadow:inset 0 0 30px #00000070; flex:1; overflow:hidden; min-height:0;
        }
        .screen-inner::before {
            content:""; position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(255,255,255,0.012); pointer-events:none; z-index:1;
            animation:screenFlicker 4s infinite; border-radius:1px;
        }
        @keyframes screenFlicker { 0%,99.5%,100%{opacity:0;} 99.6%{opacity:0.3;} }

        /* ==================== 页面切换 ==================== */
        .page { position:relative; z-index:2; width:100%; flex:1; display:flex; flex-direction:column; align-items:center; min-height:0; overflow:hidden; }
        .page.hidden { display:none; }

        /* ==================== 开始菜单页 ==================== */
        .menu-page { justify-content:center; gap:40px; }
        .title-area { display:flex; flex-direction:column; align-items:center; gap:6px; }
        .main-title {
            font-size:26px; font-weight:normal; color:#fde8b5; letter-spacing:5px;
            text-shadow:3px 3px 0 #3d1f6e,0 0 18px #c77dff,0 0 35px #9d4edd; animation:titleGlow 2.5s infinite;
        }
        @keyframes titleGlow {
            0%,100%{text-shadow:3px 3px 0 #3d1f6e,0 0 18px #c77dff,0 0 35px #9d4edd;}
            50%{text-shadow:3px 3px 0 #3d1f6e,0 0 24px #e0aaff,0 0 45px #b77dff;}
        }
        .subtitle { font-size:8px; color:#9b8ab8; }
        .gem-row { display:flex; gap:8px; }
        .gem-icon { font-size:16px; filter:drop-shadow(0 0 5px currentColor); animation:gemBounce 1.8s infinite; }
        .gem-icon:nth-child(1){color:#ff6161} .gem-icon:nth-child(2){color:#5ca0f2;animation-delay:0.25s}
        .gem-icon:nth-child(3){color:#6fcf6f;animation-delay:0.5s} .gem-icon:nth-child(4){color:#ffd966;animation-delay:0.75s}
        .gem-icon:nth-child(5){color:#c77dff;animation-delay:1.0s}
        @keyframes gemBounce { 0%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} 50%{transform:translateY(0)} 70%{transform:translateY(-3px)} }
        .menu-buttons { display:flex; flex-direction:column; gap:10px; width:100%; max-width:240px; }
        .menu-btn {
            padding:12px 14px; font-family:'Press Start 2P',monospace; font-size:11px; letter-spacing:2px;
            color:#fde8b5; background:#1f1730; border:2px solid #6b5c7a; cursor:pointer;
            box-shadow:inset -2px -2px 0 #0f0a1a,inset 2px 2px 0 #3d2f55,0 4px 0 #0f0a1a; transition:0.06s;
        }
        .menu-btn:hover { background:#2a1f3d; border-color:#c77dff; box-shadow:inset -2px -2px 0 #120b1f,inset 2px 2px 0 #4a3568,0 4px 0 #0f0a1a,0 0 14px rgba(180,130,255,0.4); }
        .menu-btn:active { transform:translateY(2px); box-shadow:inset -2px -2px 0 #0f0a1a,inset 2px 2px 0 #3d2f55,0 2px 0 #0f0a1a; }
        .menu-btn.primary {
            background:#2a1548; border-color:#c77dff; font-size:13px; letter-spacing:4px;
            box-shadow:inset -2px -2px 0 #15082b,inset 2px 2px 0 #5a2d8a,0 4px 0 #15082b,0 0 14px rgba(150,80,220,0.4);
            animation:primaryPulse 2s infinite;
        }
        @keyframes primaryPulse { 0%,100%{box-shadow:inset -2px -2px 0 #15082b,inset 2px 2px 0 #5a2d8a,0 4px 0 #15082b,0 0 14px rgba(150,80,220,0.4)} 50%{box-shadow:inset -2px -2px 0 #15082b,inset 2px 2px 0 #5a2d8a,0 4px 0 #15082b,0 0 22px rgba(200,130,250,0.6)} }
        .small-btns { display:flex; gap:12px; }
        .small-btn {
            font-family:'Press Start 2P',monospace; font-size:7px; letter-spacing:1.5px; color:#9b8ab8;
            background:transparent; border:2px solid #4a3d5c; padding:6px 10px; cursor:pointer; box-shadow:0 2px 0 #1a1028;
        }
        .small-btn:hover { color:#fde8b5; border-color:#9b7fc0; box-shadow:0 2px 0 #1a1028,0 0 10px rgba(160,120,220,0.3); }
        .announcement-btn {
            position:absolute; bottom:8px; left:12px; z-index:25; background:#2a1f35; border:2px solid #c77dff;
            color:#fde8b5; font-size:7px; padding:3px 8px; cursor:pointer;
        }
        .version-text { font-size:6px; color:#4a3d5c; }

        /* ==================== 弹窗通用样式 ==================== */
        .popup-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7);
            z-index:50; display:flex; align-items:center; justify-content:center; visibility:hidden; pointer-events:none;
        }
        .popup-overlay.active { visibility:visible; pointer-events:auto; }
        .popup-box {
            background:#1f1730; border:3px solid #c77dff; padding:14px 16px; max-width:280px; width:80%;
            color:#fde8b5; font-size:8px; position:relative; text-align:center;
        }
        .popup-close { position:absolute; top:2px; right:8px; background:none; border:none; color:#ff6161; font-size:12px; cursor:pointer; }

        /* ==================== 关于房间 ==================== */
        .about-room { position:absolute; top:0; left:0; width:100%; height:100%; background:#12101c; z-index:45; display:none; flex-direction:column; align-items:center; padding:12px; gap:8px; }
        .about-room.active { display:flex; }
        .room-scene { position:relative; width:100%; height:220px; background:#2a1f35; border:3px solid #5a4a6b; margin-top:4px; overflow:hidden; }
        .wall {
            position:absolute; top:0; left:0; width:100%; height:65%; background:#3d3150;
            background-image:linear-gradient(90deg,#4a3b5c 2px,transparent 2px,transparent 24px),linear-gradient(0deg,#4a3b5c 2px,transparent 2px,transparent 24px);
            background-size:24px 24px;
        }
        .floor { position:absolute; bottom:0; width:100%; height:35%; background:#1f1728; background-image:linear-gradient(90deg,#2a1f32 3px,transparent 3px); background-size:24px 24px; }
        .interactive { position:absolute; cursor:pointer; z-index:5; }
        .computer { bottom:32%; left:18%; width:40px; height:30px; background:#3d3d4a; border:2px solid #2a2a35; }
        .computer::after { content:">"; position:absolute; bottom:2px; right:3px; color:#5cf25c; font-size:10px; }
        .photo-frame { top:22%; left:8%; width:28px; height:32px; background:#5c4b6b; border:2px solid #dbb42c; }
        .bookshelf { top:18%; left:58%; width:55px; height:70px; background:#4a3525; border:2px solid #2e1f14; display:flex; flex-wrap:wrap; padding:3px; gap:2px; }
        .book{width:8px;height:16px;background:#b85c5c} .book:nth-child(2){background:#5c8ab8;height:14px} .book:nth-child(3){background:#6fb86f;height:18px} .book:nth-child(4){background:#dbb42c;height:15px}
        .window { top:18px; right:25px; width:40px; height:48px; background:#1b1d3a; border:2px solid #6b5c7a; position:absolute; }
        .info-bubble { position:absolute; bottom:6px; left:6px; right:6px; background:#0f0e1a; border:2px solid #c77dff; padding:6px; color:#fde8b5; font-size:12px; line-height:1.6; display:none; z-index:20; }
        .scene-radio{display:none} #r-none:checked~.info-bubble{display:none} #r-pc:checked~.pc-info{display:block} #r-photo:checked~.photo-info{display:block} #r-bookshelf:checked~.bookshelf-info{display:block} #r-window:checked~.window-info{display:block}
        .bubble-close{position:absolute;top:1px;right:4px;color:#ff6161;cursor:pointer;font-size:8px}

        /* ==================== 游戏主页面 ==================== */
        .game-page { gap:4px; }

        /* ==================== HUD 顶部状态栏 ==================== */
        .hud {
            width:100%; display:flex; justify-content:space-between; align-items:center; background:#2a2135;
            border:2px solid #5d4e6e; padding:6px 8px; box-shadow:inset 0 -2px 0 #1f1728;
            color:#fde8b5; font-size:8px; flex-shrink:0; position:relative; flex-wrap:wrap; gap:4px;
        }
        .hud-item { display:flex; align-items:center; gap:4px; }
        .score-label { color:#c4a8e0; font-size:7px; }
        .score-value { color:#fff3cd; font-size:11px; background:#1e1528; padding:2px 6px; border:2px solid #826fa0; }
        .level-label { color:#c77dff; font-size:7px; background:#1a1028; padding:2px 6px; border:2px solid #5a2d8a; }
        .target-display { color:#ffd966; font-size:7px; background:#1e1528; padding:2px 6px; border:2px solid #b8902a; }
        .total-popup {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            font-size: 11px; color: #ffd966; text-shadow: 2px 2px 0 #000;
            pointer-events: none; display: none; white-space: nowrap; z-index: 5;
        }
        .total-popup.negative { color: #ff6161; }
        .combo-indicator {
            background:#d94f4f; color:#ffe9b0; padding:2px 6px; border:2px solid #ffb703;
            font-size:7px; animation:pixelBlink 0.8s steps(2) infinite; display:none;
        }
        .combo-indicator.show { display:inline-block; }
        @keyframes pixelBlink { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .steps-display { color:#ffdb8e; font-size:10px; }
        .steps-display.warning { color:#ff6161; animation:pixelBlink 0.6s steps(2) infinite; }

        /* ==================== 棋盘 ==================== */
        .board-container { flex:1; display:flex; align-items:center; justify-content:center; }
        .board {
            display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr);
            gap:3px; background:#0f0e1a; border:4px solid #52527a; padding:6px; width:fit-content;
        }
        .cell {
            width:40px; height:40px; background:#2e3142; border:2px solid #5e5b7a;
            display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; transition:0.06s;
            position:relative;
        }
        .cell:active { transform:scale(0.9); }
        .cell::before { content:"◆"; font-size:24px; }
        .cell.red::before{color:#ff6161} .cell.blue::before{color:#5ca0f2} .cell.green::before{color:#6fcf6f}
        .cell.yellow::before{color:#ffd966} .cell.purple::before{color:#c77dff}
        .cell.glitch { background:#1a1a1a; border-color:#444; }
        .cell.glitch::before { content:"◘"; color:#555; text-shadow:2px 2px 0 #333,-1px -1px 0 #666; }
        .cell.special { background:#2a1f35; border-color:#dbb42c; }
        .cell.special::before { content:"✦"; color:#fcee4a; font-size:28px; text-shadow:0 0 14px #ffb703; animation:floatSpecial 0.9s steps(2) infinite; }
        @keyframes floatSpecial { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
        .cell.rainbow { background:#1a2a3a; border-color:#ff6b6b; }
        .cell.rainbow::before { content:"🌈"; font-size:24px; animation:rainbowPulse 0.6s steps(3) infinite; }
        @keyframes rainbowPulse { 0%{filter:hue-rotate(0deg)} 33%{filter:hue-rotate(120deg)} 66%{filter:hue-rotate(240deg)} 100%{filter:hue-rotate(360deg)} }
        .cell.rainbow-selected { border-color:#fff !important; box-shadow:0 0 16px #fff,0 0 24px #ff0 !important; }
        .cell.selected { border-color:#fcee4a !important; box-shadow:0 0 12px #ffb703; }
        .cell.shattering { animation:shatter 0.4s ease-out forwards; }
        @keyframes shatter { 0%{transform:scale(1);opacity:1} 20%{transform:scale(1.2);opacity:1} 100%{transform:scale(0.2);opacity:0} }
        .shard { position:absolute; width:8px; height:8px; background:inherit; pointer-events:none; z-index:10; }
        @keyframes shard1 { 0%{opacity:1; transform:translate(0,0);} 100%{opacity:0; transform:translate(-12px,-12px) rotate(45deg);} }
        @keyframes shard2 { 0%{opacity:1; transform:translate(0,0);} 100%{opacity:0; transform:translate(12px,-12px) rotate(-45deg);} }
        @keyframes shard3 { 0%{opacity:1; transform:translate(0,0);} 100%{opacity:0; transform:translate(-12px,12px) rotate(-45deg);} }
        @keyframes shard4 { 0%{opacity:1; transform:translate(0,0);} 100%{opacity:0; transform:translate(12px,12px) rotate(45deg);} }
        .cell.new-spawn { animation:spawnIn 0.25s; }
        @keyframes spawnIn { 0%{transform:scale(0.3);opacity:0} 100%{transform:scale(1);opacity:1} }

        /* ==================== 道具腰带 ==================== */
        .item-belt {
            width:100%; background:#2b2538; border:2px solid #6b5c7a; padding:4px 6px;
            display:flex; align-items:center; gap:6px; flex-shrink:0; flex-wrap:wrap;
        }
        .item-slot { width:28px; height:28px; background:#19132b; border:2px dashed #5c4b6b; display:flex; align-items:center; justify-content:center; font-size:14px; opacity:0.55; }
        .item-slot.active-slot { border-color:#ffd700; box-shadow:0 0 8px #ffd700; opacity:1; cursor:pointer; }
        .item-slot.used-slot { opacity:0.4; cursor:default; }
        .back-btn { font-size:6px; color:#9b8ab8; background:none; border:2px solid #4a3d5c; padding:3px 6px; cursor:pointer; margin-left:auto; }
        .rainbow-hint { color:#ff6b6b; font-size:6px; animation:pixelBlink 0.6s steps(2) infinite; display:none; }
        .rainbow-hint.show { display:inline; }
        .glitch-warning {
            color:#ff6161; font-size:7px; animation:pixelBlink 0.6s steps(2) infinite; display:none;
            background:#2a1111; border:2px solid #ff4444; padding:2px 5px;
        }
        .glitch-warning.show { display:inline-block; }

        /* ==================== 结算弹窗 ==================== */
        .game-over-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8);
            z-index:30; display:flex; align-items:center; justify-content:center; flex-direction:column;
            gap:10px; opacity:0; pointer-events:none; transition:0.3s;
        }
        .game-over-overlay.active { opacity:1; pointer-events:auto; }
        .game-over-panel { background:#1f1730; border:4px solid #c77dff; padding:16px; text-align:center; color:#fde8b5; }
        .game-over-text { font-size:14px; margin-bottom:6px; }
        .restart-btn,.menu-return-btn { font-family:'Press Start 2P',monospace; font-size:8px; background:#2a1548; border:2px solid #c77dff; color:#fde8b5; padding:6px 12px; cursor:pointer; margin:3px; }

        /* ==================== 道具奖励面板 ==================== */
        .reward-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85);
            z-index:40; display:none; align-items:center; justify-content:center; flex-direction:column; gap:10px;
        }
        .reward-overlay.active { display:flex; }
        .reward-title { color:#fde8b5; font-size:12px; text-shadow:0 0 20px #c77dff; }
        .reward-cards { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
        .reward-card {
            background:#1f1730; border:3px solid #6b5c7a; padding:10px 8px; width:72px;
            text-align:center; color:#fde8b5; font-size:6px; cursor:pointer; transition:0.06s;
            box-shadow:0 4px 0 #0a0a1a;
        }
        .reward-card:hover { background:#2a1f3d; border-color:#c77dff; box-shadow:0 4px 0 #0a0a1a,0 0 12px rgba(200,130,255,0.5); }
        .reward-card:active { transform:translateY(2px); box-shadow:0 2px 0 #0a0a1a; }
        .reward-icon { font-size:20px; margin-bottom:4px; }
        .reward-name { font-size:8px; color:#ffd966; margin-bottom:3px; }
        .reward-desc { font-size:5px; color:#cbbae0; line-height:1.3; }

        /* ==================== 全屏闪烁效果 ==================== */
        .flash-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:white; opacity:0; pointer-events:none; z-index:100;
            animation:flashIn 0.5s ease-out forwards;
        }
        @keyframes flashIn { 0%{opacity:0.8;} 100%{opacity:0;} }

        /* ==================== 界面扭曲效果 ==================== */
        .visual-glitch-dot {
            position:absolute; width:5px; height:5px; background:#000;
            pointer-events:none; z-index:15; animation:dotFlicker 0.4s steps(1) infinite;
        }
        @keyframes dotFlicker { 0%,100%{opacity:1;} 30%{opacity:0.2;} 60%{opacity:0.8;} 80%{opacity:0.5;} }
        .popup {
            position:absolute; background:#1a1028; border:3px solid #ff44ff;
            box-shadow:0 0 10px rgba(255,68,255,0.5),4px 4px 0 rgba(0,0,0,0.8);
            padding:8px 10px; z-index:20; cursor:pointer; text-align:center;
            font-size:7px; color:#ff88ff; letter-spacing:1px;
            animation:popupBounce 0.3s steps(3);
        }
        @keyframes popupBounce { 0%{transform:scale(0.5);opacity:0;} 100%{transform:scale(1);opacity:1;} }
        .popup-title { background:#ff44ff; color:#000; padding:2px 6px; margin:-8px -10px 6px -10px; font-size:8px; }
        .popup-btn { margin-top:6px; padding:3px 12px; background:#3d1f3a; border:2px solid #ff44ff; color:#ff88ff; font-family:'Press Start 2P',monospace; font-size:7px; cursor:pointer; }

        /* ==================== 骰子弹窗 ==================== */
        .dice-popup-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85);
            z-index:100 !important; display:none; align-items:center; justify-content:center; flex-direction:column; gap:8px;
        }
        .dice-popup-overlay.active { display:flex; }
        .dice-result-text { color:#fde8b5; font-size:10px; text-align:center; }
        .dice-result-icon { font-size:48px; margin:8px 0; animation:diceRoll 0.4s steps(6); }
        @keyframes diceRoll { 0%{transform:rotate(0deg);} 16%{transform:rotate(60deg);} 33%{transform:rotate(120deg);} 50%{transform:rotate(180deg);} 66%{transform:rotate(240deg);} 83%{transform:rotate(300deg);} 100%{transform:rotate(360deg);} }
        .dice-close-btn { font-family:'Press Start 2P',monospace; font-size:8px; background:#2a1548; border:2px solid #c77dff; color:#fde8b5; padding:6px 14px; cursor:pointer; }

        /* ==================== 被动道具提示栏 ==================== */
        .passive-bar {
            width:100%; background:#0a1a1a; border:1px solid #2a4a4a; padding:2px 6px;
            display:flex; align-items:center; gap:3px; flex-wrap:wrap; font-size:5px; color:#5cf; flex-shrink:0;
        }

        /* ==================== 桌面端适配 ==================== */
        @media (min-width:768px) {
            body{background:#0d0b14;padding:20px;overflow:auto}
            .crt-monitor{border:14px solid #3d3d4a;border-radius:20px;box-shadow:inset 0 0 80px rgba(0,0,0,0.85),0 0 0 5px #1e1e28,0 0 0 10px #0a0a0f;padding:20px 24px 24px;width:auto;max-width:600px;height:auto;transform:scale(1.5);transform-origin:center center}
            .main-title{font-size:30px} .menu-btn{font-size:13px} .cell{width:44px;height:44px} .game-over-text{font-size:18px} .reward-card{width:90px;padding:14px 10px;}
            .passive-bar{font-size:6px;} .item-slot{width:32px;height:32px;font-size:16px;}
        }
    </style>
</head>
<body>
    <div class="crt-monitor" id="crtMonitor">
        <div class="screen-inner" id="gameScreen">
            <!-- ==================== 开始菜单页 ==================== -->
            <div class="page menu-page" id="menuPage">
                <div class="title-area"><h1 class="main-title">裂 隙 回 响</h1><p class="subtitle">▸ PIXEL MATCH ▸</p></div>
                <div class="gem-row"><span class="gem-icon">◆</span><span class="gem-icon">◆</span><span class="gem-icon">◆</span><span class="gem-icon">◆</span><span class="gem-icon">◆</span></div>
                <div class="menu-buttons">
                    <button class="menu-btn primary" id="startGameBtn">开 始 游 戏</button>
                    <button class="menu-btn" id="continueBtn">继 续 探 索</button>
                    <button class="menu-btn">道 具 图 鉴</button>
                </div>
                <div class="small-btns"><button class="small-btn" id="settingsBtn">设 定</button><button class="small-btn" id="aboutBtn">关 于</button></div>
                <span class="version-text">ver 2.0.0</span>
                <div class="announcement-btn" id="announceBtn">📢 公告</div>
                <div class="popup-overlay" id="announceOverlay"><div class="popup-box"><span class="popup-close" id="closeAnnounce">✕</span><p>新加入了关卡和道具系统</p></div></div>
                <div class="popup-overlay" id="settingsOverlay">
                    <div class="popup-box" style="text-align:left;">
                        <span class="popup-close" id="closeSettings">✕</span>
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span>🔊 音量</span><input type="range" id="volumeSlider" min="0" max="10" value="7" style="width:90px;"></div>
                        <button class="small-btn" id="resetSaveBtn" style="width:100%;">重置存档</button>
                        <div id="resetFeedback" style="color:#5cf25c;font-size:7px;text-align:center;margin-top:4px;display:none;">存档已清除</div>
                    </div>
                </div>
                <div class="about-room" id="aboutRoom">
                    <div style="color:#fde8b5;font-size:12px;">关 于 · 裂 隙 回 响</div>
                    <div class="room-scene"><div class="wall"></div><div class="floor"></div>
                        <input type="radio" name="room-item" id="r-none" class="scene-radio" checked>
                        <input type="radio" name="room-item" id="r-pc" class="scene-radio"><input type="radio" name="room-item" id="r-photo" class="scene-radio"><input type="radio" name="room-item" id="r-bookshelf" class="scene-radio"><input type="radio" name="room-item" id="r-window" class="scene-radio">
                        <label for="r-pc" class="interactive computer"></label><label for="r-photo" class="interactive photo-frame"></label><label for="r-bookshelf" class="interactive bookshelf"><span class="book"></span><span class="book"></span><span class="book"></span><span class="book"></span></label><div class="window"></div><label for="r-window" class="interactive window" style="background:transparent;border:none;"></label>
                        <div class="info-bubble pc-info"><label for="r-none" class="bubble-close">✕</label><strong>► 老旧终端</strong><br>版本: v2.0.0<br>开发者: 与君</div>
                        <div class="info-bubble photo-info"><label for="r-none" class="bubble-close">✕</label><strong>► 像素合影</strong><br>我没想好写啥文案</div>
                        <div class="info-bubble bookshelf-info"><label for="r-none" class="bubble-close">✕</label><strong>► 灵感书架</strong><br>《CRT维修手册》<br>《点阵字体入门》</div>
                        <div class="info-bubble window-info"><label for="r-none" class="bubble-close">✕</label><strong>► 窗外</strong><br>数据之海，紫色月光</div>
                    </div>
                    <button class="small-btn" id="closeAboutRoom">◀ 返回</button>
                </div>
            </div>

            <!-- ==================== 游戏页面 ==================== -->
            <div class="page game-page hidden" id="gamePage">
                <div class="hud">
                    <div class="hud-item"><span class="level-label" id="levelDisplay">第1关</span></div>
                    <div class="hud-item"><span class="score-label">裂隙深度</span><span class="score-value" id="scoreDisplay">0</span></div>
                    <span class="total-popup" id="totalPopup"></span>
                    <div class="hud-item"><span>🎯</span><span class="target-display" id="targetDisplay">目标 2000</span></div>
                    <div class="hud-item"><span>⚡</span><span class="steps-display" id="stepsDisplay">步数 24</span></div>
                    <span class="combo-indicator" id="comboIndicator">✧ 连消 x1 ✧</span>
                    <span class="rainbow-hint" id="rainbowHint">🎯 选择颜色或特殊块</span>
                    <span class="glitch-warning" id="glitchWarning">⚠️ 坏点侵蚀</span>
                </div>
                <div class="passive-bar" id="passiveBar">被动道具: 无</div>
                <div class="board-container"><div class="board" id="board"></div></div>
                <div class="item-belt" id="itemBelt">
                    <div class="item-slot" id="beltSlot0">🔒</div>
                    <div class="item-slot" id="beltSlot1">🔒</div>
                    <div class="item-slot" id="beltSlot2">🔒</div>
                    <div class="item-slot" id="beltSlot3">🔒</div>
                    <button class="back-btn" id="backToMenuBtn">◀ 返回</button>
                </div>
                <div class="reward-overlay" id="rewardOverlay">
                    <div class="reward-title">选择道具</div>
                    <div class="reward-cards" id="rewardCards"></div>
                </div>
                <div class="dice-popup-overlay" id="dicePopupOverlay">
                    <div class="dice-result-text" id="diceResultText">掷出命运之骰...</div>
                    <div class="dice-result-icon" id="diceResultIcon">🎲</div>
                    <button class="dice-close-btn" id="diceCloseBtn">继续</button>
                </div>
                <div class="game-over-overlay" id="gameOverOverlay">
                    <div class="game-over-panel" id="gameOverPanel">
                        <div class="game-over-text" id="gameOverText">裂隙闭合</div>
                        <div class="game-over-score" id="gameOverScore">最终得分: 0</div>
                        <div id="gameOverButtons">
                            <button class="restart-btn" id="restartBtn">再次探索</button>
                            <button class="menu-return-btn" id="menuReturnBtn">返回主菜单</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function(){
            // ==================== DOM 元素引用 ====================
            const menuPage=document.getElementById('menuPage'),gamePage=document.getElementById('gamePage'),crtMonitor=document.getElementById('crtMonitor');
            const boardEl=document.getElementById('board'),scoreDisplay=document.getElementById('scoreDisplay'),stepsDisplay=document.getElementById('stepsDisplay');
            const comboIndicator=document.getElementById('comboIndicator'),gameOverOverlay=document.getElementById('gameOverOverlay');
            const gameOverScore=document.getElementById('gameOverScore'),gameOverText=document.getElementById('gameOverText');
            const gameOverButtons=document.getElementById('gameOverButtons'),rainbowHint=document.getElementById('rainbowHint');
            const glitchWarning=document.getElementById('glitchWarning'),totalPopup=document.getElementById('totalPopup');
            const levelDisplay=document.getElementById('levelDisplay'),targetDisplay=document.getElementById('targetDisplay');
            const rewardOverlay=document.getElementById('rewardOverlay'),rewardCards=document.getElementById('rewardCards');
            const itemBelt=document.getElementById('itemBelt'),passiveBar=document.getElementById('passiveBar');
            const dicePopupOverlay=document.getElementById('dicePopupOverlay'),diceResultText=document.getElementById('diceResultText');
            const diceResultIcon=document.getElementById('diceResultIcon'),diceCloseBtn=document.getElementById('diceCloseBtn');
            const gameScreen=document.getElementById('gameScreen');
            const SAVE_KEY='riftEchoSave';

            // ==================== 页面切换事件 ====================
            document.getElementById('startGameBtn').addEventListener('click',()=>{clearGameState();menuPage.classList.add('hidden');gamePage.classList.remove('hidden');startNewGame();});
            document.getElementById('backToMenuBtn').addEventListener('click',()=>{
                gamePage.classList.add('hidden');menuPage.classList.remove('hidden');
                gameOverOverlay.classList.remove('active');rainbowMode=null;
                crtMonitor.classList.remove('mirrored','filtered');
                if(visualGlitchInterval)clearInterval(visualGlitchInterval);
                const dots=gameScreen.querySelectorAll('.visual-glitch-dot');dots.forEach(d=>d.remove());
            });
            document.getElementById('menuReturnBtn').addEventListener('click',()=>{
                gamePage.classList.add('hidden');menuPage.classList.remove('hidden');
                gameOverOverlay.classList.remove('active');rainbowMode=null;
                crtMonitor.classList.remove('mirrored','filtered');
                if(visualGlitchInterval)clearInterval(visualGlitchInterval);
                const dots=gameScreen.querySelectorAll('.visual-glitch-dot');dots.forEach(d=>d.remove());
            });
            document.getElementById('continueBtn').addEventListener('click',()=>{if(loadGameState()){menuPage.classList.add('hidden');gamePage.classList.remove('hidden');}else alert('暂无存档');});

            // ==================== 公告弹窗 ====================
            document.getElementById('announceBtn').addEventListener('click',()=>document.getElementById('announceOverlay').classList.add('active'));
            document.getElementById('closeAnnounce').addEventListener('click',()=>document.getElementById('announceOverlay').classList.remove('active'));

            // ==================== 设定面板 ====================
            const settingsOverlay=document.getElementById('settingsOverlay');
            document.getElementById('settingsBtn').addEventListener('click',()=>settingsOverlay.classList.add('active'));
            document.getElementById('closeSettings').addEventListener('click',()=>settingsOverlay.classList.remove('active'));
            const volumeSlider=document.getElementById('volumeSlider');volumeSlider.addEventListener('input',()=>localStorage.setItem('gameVolume',volumeSlider.value));if(localStorage.getItem('gameVolume'))volumeSlider.value=localStorage.getItem('gameVolume');
            const resetSaveBtn=document.getElementById('resetSaveBtn'),resetFeedback=document.getElementById('resetFeedback');
            resetSaveBtn.addEventListener('click',()=>{if(resetSaveBtn.textContent==='重置存档'){resetSaveBtn.textContent='确定重置？';}else{localStorage.clear();volumeSlider.value=7;resetFeedback.style.display='block';resetSaveBtn.textContent='重置存档';setTimeout(()=>resetFeedback.style.display='none',2000);}});

            // ==================== 关于房间 ====================
            const aboutRoom=document.getElementById('aboutRoom');
            document.getElementById('aboutBtn').addEventListener('click',()=>{aboutRoom.classList.add('active');document.getElementById('r-none').checked=true;});
            document.getElementById('closeAboutRoom').addEventListener('click',()=>aboutRoom.classList.remove('active'));

            // ==================== 游戏常量 ====================
            const ROWS=8,COLS=8,COLORS=5,COLOR_CLASSES=['red','blue','green','yellow','purple'];
            const TYPE_GLITCH=-2,TYPE_SPECIAL=-3,TYPE_RAINBOW=-4;
            const TOTAL_STEPS=24;
            const LEVELS=[{target:2000,glitchInterval:5,startGlitch:0},{target:3000,glitchInterval:5,startGlitch:0},{target:5000,glitchInterval:4,startGlitch:0},{target:7000,glitchInterval:4,startGlitch:3},{target:9000,glitchInterval:3,startGlitch:5},{target:15000,glitchInterval:3,startGlitch:8}];

            // ==================== 道具池定义 ====================
            const ITEM_POOL = [
                {id:'battery',name:'步数电池',icon:'🔋',desc:'最大步数+3',type:'passive',effect:()=>{maxSteps=Math.min(40,maxSteps+3);}},
                {id:'hourglass',name:'时间沙漏',icon:'⏳',desc:'使用后当前步数+3步',type:'active',effect:()=>{addBeltItem('hourglass');}},
                {id:'recycle',name:'步数回收',icon:'♻️',desc:'消15块恢复1步',type:'passive',effect:()=>{hasRecycle=true;}},
                {id:'slowrift',name:'慢速裂隙',icon:'🐢',desc:'步数消耗减半',type:'passive',effect:()=>{hasSlowRift=true;}},
                {id:'prism',name:'彩虹棱镜',icon:'🔮',desc:'点普通块变彩虹+周围特殊块',type:'active',effect:()=>{addBeltItem('prism');}},
                {id:'specialgen',name:'特殊块生成',icon:'✦',desc:'消12块自动生成特殊块',type:'passive',effect:()=>{hasSpecialGen=true;}},
                {id:'resonance',name:'彩虹共鸣',icon:'🌈',desc:'裂隙共鸣得分×2',type:'passive',effect:()=>{hasResonance=true;}},
                {id:'chainext',name:'连锁延伸',icon:'💥',desc:'特殊块范围3×3→5×5',type:'passive',effect:()=>{hasChainExt=true;}},
                {id:'dice',name:'裂隙骰子',icon:'🎲',desc:'掷骰子:1-2扣步+坏点,5-6+500分清坏点',type:'active',effect:()=>{addBeltItem('dice');}},
                {id:'risk',name:'风险消除',icon:'⚡',desc:'20%×5 / 5%扣100分',type:'passive',effect:()=>{hasRisk=true;}},
                {id:'allin',name:'全押',icon:'💰',desc:'步数减半,得分×2',type:'active',effect:()=>{addBeltItem('allin');}},
                {id:'lucky',name:'幸运护符',icon:'🍀',desc:'负面概率降50%',type:'passive',effect:()=>{hasLucky=true;}},
                {id:'mirror',name:'镜像棋盘',icon:'🪞',desc:'棋盘颠倒,消块+15分',type:'passive',effect:()=>{hasMirror=true;applyMirror();}},
                {id:'filter',name:'彩色滤镜',icon:'🎨',desc:'紫色方块得分×2',type:'passive',effect:()=>{hasFilter=true;applyFilter();}},
                {id:'popup',name:'弹窗地狱',icon:'🪟',desc:'每6步弹窗,关闭+500分',type:'passive',effect:()=>{hasPopupHell=true;}},
                {id:'visualglitch',name:'坏点侵蚀视觉',icon:'💀',desc:'全屏随机坏点,得分×1.5',type:'passive',effect:()=>{hasVisualGlitch=true;startVisualGlitch();}},
            ];

            // ==================== 游戏状态变量 ====================
            let board,score,stepsLeft,selectedRow=-1,selectedCol=-1,isProcessing=false,comboCount=0,gameOver=false,newSpawnCells=[],rainbowMode=null;
            let stepsSinceLastGlitch=0;
            let currentStage=1,targetScore=LEVELS[0].target,glitchInterval=LEVELS[0].glitchInterval,startGlitchCount=LEVELS[0].startGlitch,totalScore=0,stage6Cleared=false;
            let obtainedItems=[],beltItems=[],maxSteps=TOTAL_STEPS;
            let hasRecycle=false,hasSlowRift=false,hasSpecialGen=false,hasResonance=false,hasChainExt=false;
            let hasRisk=false,hasLucky=false,hasMirror=false,hasFilter=false,hasPopupHell=false,hasVisualGlitch=false;
            let allinActive=false,diceUsed=false,prismUsed=false;
            let recycleCounter=0,specialGenCounter=0;
            let halfStepToggle=false,stepsSinceLastPopup=0,visualGlitchInterval=null;

            // ==================== HUD 更新 ====================
            function updateHUD(){scoreDisplay.textContent=score.toLocaleString();stepsDisplay.textContent='步数 '+stepsLeft;stepsDisplay.classList.toggle('warning',stepsLeft<=6);levelDisplay.textContent='第'+currentStage+'关';targetDisplay.textContent='目标 '+targetScore;}
            function addScore(delta){if(delta<0)score=Math.max(0,score+delta);else score+=delta;scoreDisplay.textContent=score.toLocaleString();}
            function showTotalPopup(delta){if(delta===0)return;totalPopup.textContent=(delta>0?'+':'')+delta;totalPopup.classList.toggle('negative',delta<0);totalPopup.style.display='block';setTimeout(()=>totalPopup.style.display='none',1500);}
            function updatePassiveBar(){
                const passives=[];
                if(hasRecycle)passives.push('♻️步数回收');if(hasSlowRift)passives.push('🐢慢速裂隙');
                if(hasSpecialGen)passives.push('✦特殊块生成');if(hasResonance)passives.push('🌈彩虹共鸣');
                if(hasChainExt)passives.push('💥连锁延伸');if(hasRisk)passives.push('⚡风险消除');
                if(hasLucky)passives.push('🍀幸运护符');if(hasMirror)passives.push('🪞镜像棋盘');
                if(hasFilter)passives.push('🎨彩色滤镜');if(hasPopupHell)passives.push('🪟弹窗地狱');
                if(hasVisualGlitch)passives.push('💀坏点侵蚀视觉');if(allinActive)passives.push('💰全押(激活)');
                passiveBar.textContent=passives.length>0?'被动: '+passives.join(' '):'被动道具: 无';
            }

            // ==================== 存档系统 ====================
            function saveGameState(){localStorage.setItem(SAVE_KEY,JSON.stringify({board,score,stepsLeft,stepsSinceLastGlitch,currentStage,targetScore,totalScore,glitchInterval,startGlitchCount,stage6Cleared,obtainedItems,beltItems,maxSteps,hasRecycle,hasSlowRift,hasSpecialGen,hasResonance,hasChainExt,hasRisk,hasLucky,hasMirror,hasFilter,hasPopupHell,hasVisualGlitch,allinActive,diceUsed,prismUsed,recycleCounter,specialGenCounter,stepsSinceLastPopup}));}
            function loadGameState(){const saved=localStorage.getItem(SAVE_KEY);if(!saved)return false;try{const state=JSON.parse(saved);if(state.board&&Array.isArray(state.board)&&state.board.length===ROWS){Object.assign(window,state);selectedRow=selectedCol=-1;isProcessing=comboCount=0;gameOver=false;newSpawnCells=[];rainbowMode=null;updateHUD();gameOverOverlay.classList.remove('active');applyAllVisuals();renderBoard();renderBelt();updatePassiveBar();return true;}}catch(e){}return false;}
            function clearGameState(){localStorage.removeItem(SAVE_KEY);}

            // ==================== 道具腰带管理 ====================
            function addBeltItem(itemId){if(beltItems.length>=4)return;beltItems.push({id:itemId,used:false});renderBelt();}
            function renderBelt(){const slots=itemBelt.querySelectorAll('.item-slot');for(let i=0;i<4;i++){if(i<beltItems.length){const item=ITEM_POOL.find(it=>it.id===beltItems[i].id);slots[i].textContent=item?item.icon:'?';slots[i].className='item-slot '+(beltItems[i].used?'used-slot':'active-slot');}else{slots[i].textContent='🔒';slots[i].className='item-slot';}}}
            function useBeltItem(slotIndex){if(slotIndex>=beltItems.length||beltItems[slotIndex].used||isProcessing||gameOver)return;const itemId=beltItems[slotIndex].id;beltItems[slotIndex].used=true;renderBelt();if(itemId==='prism'){prismMode=true;rainbowMode=null;selectedRow=selectedCol=-1;renderBoard();}else if(itemId==='dice'){useDice();}else if(itemId==='allin'){useAllin();}else if(itemId==='hourglass'){stepsLeft+=3;updateHUD();}}
            document.getElementById('beltSlot0').addEventListener('click',()=>useBeltItem(0));
            document.getElementById('beltSlot1').addEventListener('click',()=>useBeltItem(1));
            document.getElementById('beltSlot2').addEventListener('click',()=>useBeltItem(2));
            document.getElementById('beltSlot3').addEventListener('click',()=>useBeltItem(3));

            // ==================== 主动道具逻辑 ====================
            let prismMode=false;
            function useDice(){
                if(diceUsed||isProcessing||gameOver) return;
                diceUsed = true;
                const roll = Math.floor(Math.random()*6)+1;
                const icons = ['⚀','⚁','⚂','⚃','⚄','⚅'];
                diceResultIcon.textContent = icons[roll-1];
                let resultText = '';
                if(roll <= 2){
                    resultText = '不幸! -3步 +3坏点';
                    stepsLeft = Math.max(0, stepsLeft-3);
                    updateHUD();
                    for(let i=0;i<3;i++) spawnRandomGlitch();
                    showTotalPopup(-15);
                } else if(roll >= 5){
                    resultText = '幸运! +500分 +清坏点';
                    addScore(500);
                    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]===TYPE_GLITCH) board[r][c] = -1;
                    applyGravityAndSpawn();
                    showTotalPopup(500);
                } else {
                    resultText = '平淡... 无事发生';
                }
                diceResultText.textContent = resultText;
                dicePopupOverlay.style.display = 'flex'; // 强制显示
                dicePopupOverlay.classList.add('active');
                renderBoard();
            }
            diceCloseBtn.addEventListener('click', ()=>{
                dicePopupOverlay.style.display = 'none';
                dicePopupOverlay.classList.remove('active');
                checkStageComplete();
                if(stepsLeft<=0 && !gameOver) endGameWithFailure();
            });
            function useAllin(){if(allinActive||isProcessing||gameOver)return;allinActive=true;const half=Math.floor(stepsLeft/2);stepsLeft-=half;updateHUD();stepsDisplay.style.color='#ff4444';updatePassiveBar();}

            // ==================== 界面效果管理 ====================
            function applyMirror(){if(hasMirror)crtMonitor.classList.add('mirrored');}
            function applyFilter(){if(hasFilter)crtMonitor.classList.add('filtered');}
            function applyAllVisuals(){applyMirror();applyFilter();if(hasVisualGlitch)startVisualGlitch();}
            function startVisualGlitch(){if(!hasVisualGlitch)return;if(visualGlitchInterval)clearInterval(visualGlitchInterval);visualGlitchInterval=setInterval(()=>{if(!gameOver)spawnVisualDots();},1500);spawnVisualDots();}
            function spawnVisualDots(){const existing=gameScreen.querySelectorAll('.visual-glitch-dot');existing.forEach(d=>d.remove());const count=10+Math.floor(Math.random()*11);for(let i=0;i<count;i++){const dot=document.createElement('div');dot.className='visual-glitch-dot';dot.style.left=Math.random()*95+'%';dot.style.top=Math.random()*95+'%';gameScreen.appendChild(dot);}setTimeout(()=>{const dots=gameScreen.querySelectorAll('.visual-glitch-dot');dots.forEach(d=>d.remove());},2000+Math.random()*2000);}

            // ==================== 棋盘初始化 ====================
            function initBoard(){board=Array.from({length:ROWS},()=>Array(COLS).fill(0));for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){let color;do{color=Math.floor(Math.random()*COLORS);}while(wouldMatch(r,c,color));board[r][c]=color;}if(startGlitchCount>0){let placed=0;const empties=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]>=0&&board[r][c]<COLORS)empties.push({r,c});while(placed<startGlitchCount&&empties.length>0){const idx=Math.floor(Math.random()*empties.length);const pos=empties.splice(idx,1)[0];board[pos.r][pos.c]=TYPE_GLITCH;placed++;}}}
            function wouldMatch(r,c,color){if(color<0)return false;if(c>=2&&board[r][c-1]===color&&board[r][c-2]===color)return true;if(r>=2&&board[r-1]&&board[r-1][c]===color&&board[r-2]&&board[r-2][c]===color)return true;return false;}

            // ==================== 游戏流程控制 ====================
            function startNewGame(){currentStage=1;totalScore=0;stage6Cleared=false;applyLevelConfig();score=0;maxSteps=TOTAL_STEPS;stepsLeft=maxSteps;stepsSinceLastGlitch=0;initBoard();selectedRow=selectedCol=-1;isProcessing=comboCount=0;gameOver=false;newSpawnCells=[];rainbowMode=null;obtainedItems=[];beltItems=[];hasRecycle=hasSlowRift=hasSpecialGen=hasResonance=hasChainExt=hasRisk=hasLucky=hasMirror=hasFilter=hasPopupHell=hasVisualGlitch=false;allinActive=diceUsed=prismUsed=false;recycleCounter=0;specialGenCounter=0;halfStepToggle=false;stepsSinceLastPopup=0;stepsDisplay.style.color='#ffdb8e';crtMonitor.classList.remove('mirrored','filtered');if(visualGlitchInterval)clearInterval(visualGlitchInterval);const dots=gameScreen.querySelectorAll('.visual-glitch-dot');dots.forEach(d=>d.remove());updateHUD();gameOverOverlay.classList.remove('active');renderBoard();renderBelt();updatePassiveBar();clearGameState();saveGameState();}
            function applyLevelConfig(){const cfg=LEVELS[currentStage-1];targetScore=cfg.target;glitchInterval=cfg.glitchInterval;startGlitchCount=cfg.startGlitch;}
            function advanceToNextStage(){totalScore+=score;if(currentStage<6){currentStage++;applyLevelConfig();score=0;stepsLeft=maxSteps;stepsSinceLastGlitch=0;initBoard();selectedRow=selectedCol=-1;isProcessing=comboCount=0;gameOver=false;newSpawnCells=[];rainbowMode=null;diceUsed=prismUsed=false;halfStepToggle=false;stepsSinceLastPopup=0;allinActive=false;stepsDisplay.style.color='#ffdb8e';beltItems.forEach(item=>item.used=false);renderBelt();updateHUD();gameOverOverlay.classList.remove('active');renderBoard();saveGameState();}}
            function endGameWithVictory(){totalScore+=score;gameOver=true;gameOverText.textContent='裂隙征服';gameOverScore.textContent='总得分: '+totalScore.toLocaleString();gameOverButtons.innerHTML=`<button class="restart-btn" id="finalRestartBtn">再次探索</button><button class="menu-return-btn" id="finalMenuBtn">返回主菜单</button>`;gameOverOverlay.classList.add('active');clearGameState();document.getElementById('finalRestartBtn').addEventListener('click',()=>{gameOverOverlay.classList.remove('active');startNewGame();});document.getElementById('finalMenuBtn').addEventListener('click',()=>{gamePage.classList.add('hidden');menuPage.classList.remove('hidden');gameOverOverlay.classList.remove('active');crtMonitor.classList.remove('mirrored','filtered');if(visualGlitchInterval)clearInterval(visualGlitchInterval);});renderBoard();}

            // ==================== 彩虹棱镜 ====================

            // ==================== 裂隙共鸣 ====================
            async function triggerResonance(rRainbow,cRainbow,rSpecial,cSpecial){if(isProcessing||gameOver)return;const startScore=score;isProcessing=true;rainbowMode=null;rainbowHint.classList.remove('show');const toClear=[];let clearCount=0;for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++){const v=board[rr][cc];if(v>=0&&v<COLORS){toClear.push({r:rr,c:cc});clearCount++;}else if(v===TYPE_GLITCH)toClear.push({r:rr,c:cc});}toClear.push({r:rRainbow,c:cRainbow});toClear.push({r:rSpecial,c:cSpecial});const flash=document.createElement('div');flash.className='flash-overlay';gameScreen.appendChild(flash);setTimeout(()=>flash.remove(),500);boardEl.querySelectorAll('.cell').forEach(cell=>{const rr=parseInt(cell.dataset.row),cc=parseInt(cell.dataset.col);if(toClear.some(p=>p.r===rr&&p.c===cc))shatterCell(cell);});await sleep(400);for(const pos of toClear)board[pos.r][pos.c]=-1;let resonanceScore=clearCount*10+50+30;if(hasResonance)resonanceScore=clearCount*20+50+30;if(hasMirror)resonanceScore+=clearCount*15;if(hasVisualGlitch)resonanceScore=Math.floor(resonanceScore*1.5);if(allinActive)resonanceScore*=2;addScore(resonanceScore);applyGravityAndSpawn();renderBoard();await processChain();saveGameState();showTotalPopup(score-startScore);checkStageComplete();if(stepsLeft<=0&&!gameOver)endGameWithFailure();isProcessing=false;renderBoard();}

            // ==================== 彩虹块 ====================
            async function triggerRainbow(r,c,color){if(isProcessing||gameOver)return;const startScore=score;isProcessing=true;rainbowMode=null;rainbowHint.classList.remove('show');const toClear=[{r,c}];for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++)if(board[rr][cc]===color)toClear.push({r:rr,c:cc});boardEl.querySelectorAll('.cell').forEach(cell=>{const rr=parseInt(cell.dataset.row),cc=parseInt(cell.dataset.col);if(toClear.some(p=>p.r===rr&&p.c===cc))shatterCell(cell);});await sleep(400);let clearCount=0;for(const pos of toClear){if(board[pos.r][pos.c]>=0)clearCount++;board[pos.r][pos.c]=-1;}let rainbowScore=clearCount*10+50;if(hasFilter&&color===3)rainbowScore=clearCount*20+50;if(hasMirror)rainbowScore+=clearCount*15;if(hasVisualGlitch)rainbowScore=Math.floor(rainbowScore*1.5);if(allinActive)rainbowScore*=2;addScore(rainbowScore);applyGravityAndSpawn();renderBoard();await processChain();saveGameState();showTotalPopup(score-startScore);checkStageComplete();if(stepsLeft<=0&&!gameOver)endGameWithFailure();isProcessing=false;renderBoard();}

            // ==================== 特殊块引爆 ====================
            async function triggerSpecial(row,col){

                while(queue.length>0){const current=queue.shift();for(let dr=-range;dr<=range;dr++)for(let dc=-range;dc<=range;dc++){const nr=current.r+dr,nc=current.c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!allCleared.has(nr*COLS+nc)){allCleared.add(nr*COLS+nc);if(board[nr][nc]===TYPE_SPECIAL||board[nr][nc]===TYPE_RAINBOW)queue.push({r:nr,c:nc});}}}

                if(hasSpecialGen){specialGenCounter+=normalCleared;while(specialGenCounter>=12){specialGenCounter-=12;const empties=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]===-1)empties.push({r,c});if(empties.length>0){const pos=empties[Math.floor(Math.random()*empties.length)];board[pos.r][pos.c]=TYPE_SPECIAL;}}}
                applyGravityAndSpawn();renderBoard();await processChain();

            }

            // ==================== 被动计数器 ====================
            function addSwapCounters(count){if(hasRecycle){recycleCounter+=count;while(recycleCounter>=15){recycleCounter-=15;stepsLeft++;updateHUD();}}if(hasSpecialGen){specialGenCounter+=count;}}
            function checkAndSpawnSpecialGen(){if(!hasSpecialGen)return;while(specialGenCounter>=12){specialGenCounter-=12;const empties=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]===-1)empties.push({r,c});if(empties.length>0){const pos=empties[Math.floor(Math.random()*empties.length)];board[pos.r][pos.c]=TYPE_SPECIAL;}}}

            // ==================== 交换与消除逻辑 ====================
            async function trySwap(r1,c1,r2,c2){
                isProcessing=true;const startScore=score;[board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];renderBoard();const matchData=findMatches();
                if(matchData.matched.size===0){await sleep(180);[board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];renderBoard();isProcessing=false;return;}
                if(hasSlowRift){halfStepToggle=!halfStepToggle;if(!halfStepToggle){stepsLeft--;updateHUD();}}else{stepsLeft--;updateHUD();}
                if(stepsLeft<=6)stepsDisplay.classList.add('warning');comboCount=0;await processMatches(matchData);
                const glitchCount=countGlitchOnBoard();if(glitchCount>0){addScore(-(glitchCount*5));glitchWarning.textContent='⚠️ 坏点侵蚀 -'+(glitchCount*5);glitchWarning.classList.add('show');setTimeout(()=>glitchWarning.classList.remove('show'),800);}

            // ==================== 弹窗地狱 ====================
            function spawnPopup(){const popup=document.createElement('div');popup.className='popup';popup.innerHTML=`<div class="popup-title">⚠ 裂隙错误</div><div style="font-size:6px;color:#ccc;">代码 #${Math.floor(Math.random()*900)+100}</div><button class="popup-btn">确认</button>`;const maxX=gameScreen.clientWidth-120,maxY=gameScreen.clientHeight-100;popup.style.left=(20+Math.random()*(maxX-20))+'px';popup.style.top=(40+Math.random()*(maxY-40))+'px';gameScreen.appendChild(popup);const closeHandler=(e)=>{e.stopPropagation();popup.remove();addScore(500);let cleared=0;for(let r=0;r<ROWS&&cleared<3;r++)for(let c=0;c<COLS&&cleared<3;c++)if(board[r][c]===TYPE_GLITCH){board[r][c]=-1;cleared++;}if(cleared>0){applyGravityAndSpawn();renderBoard();}checkStageComplete();};popup.querySelector('.popup-btn').addEventListener('click',closeHandler);popup.addEventListener('click',closeHandler);}

            // ==================== 匹配检测 ====================
            function findMatches(){const matched=new Set(),hSegments=[],vSegments=[];for(let r=0;r<ROWS;r++){let c=0;while(c<COLS){if(board[r][c]<0){c++;continue;}const color=board[r][c];let end=c;while(end+1<COLS&&board[r][end+1]===color)end++;const len=end-c+1;if(len>=3){for(let i=c;i<=end;i++)matched.add(r*COLS+i);hSegments.push({r,cStart:c,cEnd:end});}c=end+1;}}for(let c=0;c<COLS;c++){let r=0;while(r<ROWS){if(board[r][c]<0){r++;continue;}const color=board[r][c];let end=r;while(end+1<ROWS&&board[end+1][c]===color)end++;const len=end-r+1;if(len>=3){for(let i=r;i<=end;i++)matched.add(i*COLS+c);vSegments.push({c,rStart:r,rEnd:end});}r=end+1;}}const matchLengths=[];for(const seg of hSegments){const len=seg.cEnd-seg.cStart+1;if(len===4)matchLengths.push({r:seg.r,c:Math.floor((seg.cStart+seg.cEnd)/2),type:'straight4'});else if(len>=5)matchLengths.push({r:seg.r,c:Math.floor((seg.cStart+seg.cEnd)/2),type:'straight5'});}for(const seg of vSegments){const len=seg.rEnd-seg.rStart+1;if(len===4)matchLengths.push({r:Math.floor((seg.rStart+seg.rEnd)/2),c:seg.c,type:'straight4'});else if(len>=5)matchLengths.push({r:Math.floor((seg.rStart+seg.rEnd)/2),c:seg.c,type:'straight5'});}const hSet=new Set();for(const seg of hSegments){for(let c=seg.cStart;c<=seg.cEnd;c++)hSet.add(seg.r*COLS+c);}const crossPoints=[];for(const seg of vSegments){for(let r=seg.rStart;r<=seg.rEnd;r++){const key=r*COLS+seg.c;if(hSet.has(key))crossPoints.push({r,c:seg.c});}}const processedCross=new Set();for(const pt of crossPoints){const key=pt.r*COLS+pt.c;if(processedCross.has(key))continue;processedCross.add(key);const hSeg2=hSegments.find(s=>s.r===pt.r&&pt.c>=s.cStart&&pt.c<=s.cEnd);const vSeg2=vSegments.find(s=>s.c===pt.c&&pt.r>=s.rStart&&pt.r<=s.rEnd);if(!hSeg2||!vSeg2)continue;const hLen=hSeg2.cEnd-hSeg2.cStart+1;const vLen=vSeg2.rEnd-vSeg2.rStart+1;const isHEnd=(pt.c===hSeg2.cStart||pt.c===hSeg2.cEnd);const isVEnd=(pt.r===vSeg2.rStart||pt.r===vSeg2.rEnd);if(hLen>=5&&vLen>=3&&!isHEnd&&!isVEnd){const hMid=Math.floor((hSeg2.cStart+hSeg2.cEnd)/2);if(pt.c>=hMid-1&&pt.c<=hMid+1){matchLengths.push({r:pt.r,c:pt.c,type:'bigT'});continue;}}matchLengths.push({r:pt.r,c:pt.c,type:'cross'});}return {matched,matchLengths};}

            // ==================== 特殊块生成 ====================
            function spawnSpecials(matchLengths){for(const m of matchLengths){if(m.type==='bigT'){const midR=m.r,midC=m.c;const positions=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=midR+dr,nc=midC+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===-1)positions.push({r:nr,c:nc});}let placed=0;for(const pos of positions){if(placed>=2)break;board[pos.r][pos.c]=TYPE_RAINBOW;placed++;}if(placed<2&&board[midR][midC]===-1)board[midR][midC]=TYPE_RAINBOW;}else if(m.type==='straight5'){const midR=m.r,midC=m.c;if(board[midR][midC]===-1)board[midR][midC]=TYPE_RAINBOW;else{const positions=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=midR+dr,nc=midC+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===-1)positions.push({r:nr,c:nc});}if(positions.length>0)board[positions[0].r][positions[0].c]=TYPE_RAINBOW;}}else{const midR=m.r,midC=m.c;if(board[midR][midC]===-1)board[midR][midC]=TYPE_SPECIAL;else{const positions=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=midR+dr,nc=midC+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===-1)positions.push({r:nr,c:nc});}if(positions.length>0)board[positions[0].r][positions[0].c]=TYPE_SPECIAL;}}}}

            // ==================== 消除处理 ====================
            function clearMatchedAndAdjacentGlitch(matchedSet){const toClear=new Set(matchedSet);for(const idx of matchedSet){const r=Math.floor(idx/COLS),c=idx%COLS;[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===TYPE_GLITCH)toClear.add(nr*COLS+nc);});}return toClear;}
            async function processMatches(matchData){
                let{matched,matchLengths}=matchData;
                while(matched.size>0){
                    comboCount++;if(comboCount>=2){comboIndicator.textContent='✧ 连消 x'+comboCount+' ✧';comboIndicator.classList.add('show');}
                    const toClear=clearMatchedAndAdjacentGlitch(matched);
                    let baseScore=matched.size*10+(comboCount-1)*20;
                    if(hasRisk){const rand=Math.random();if(rand<0.2)baseScore*=5;else if(rand>0.95)baseScore=Math.max(0,baseScore-100);}
                    if(allinActive)baseScore*=2;
                    if(hasFilter){let purpleCount=0,normalCount=0;for(const idx of matched){const r=Math.floor(idx/COLS),c=idx%COLS;if(board[r][c]>=0&&board[r][c]<COLORS){if(COLOR_CLASSES[board[r][c]]==='purple')purpleCount++;else normalCount++;}}baseScore=normalCount*10+purpleCount*20+(comboCount-1)*20;}
                    if(hasMirror){let mirrorBonus=0;for(const idx of matched){const r=Math.floor(idx/COLS),c=idx%COLS;if(board[r][c]>=0&&board[r][c]<COLORS)mirrorBonus+=15;}baseScore+=mirrorBonus;}
                    if(hasVisualGlitch)baseScore=Math.floor(baseScore*1.5);
                    addScore(baseScore);
                    let normalInThisBatch=0;for(const idx of matched){if(board[Math.floor(idx/COLS)][idx%COLS]>=0&&board[Math.floor(idx/COLS)][idx%COLS]<COLORS)normalInThisBatch++;}
                    addSwapCounters(normalInThisBatch);
                    document.querySelectorAll('.cell').forEach(c=>{if(toClear.has(parseInt(c.dataset.row)*COLS+parseInt(c.dataset.col)))shatterCell(c);});
                    const delay=Math.max(150,380-comboCount*40);await sleep(delay);
                    for(const idx of toClear)board[Math.floor(idx/COLS)][idx%COLS]=-1;
                    spawnSpecials(matchLengths);checkAndSpawnSpecialGen();
                    applyGravityAndSpawn();renderBoard();await sleep(150);
                    const next=findMatches();matched=next.matched;matchLengths=next.matchLengths;
                }
                comboIndicator.classList.remove('show');
            }
            function applyGravityAndSpawn(){for(let c=0;c<COLS;c++){let wr=ROWS-1;for(let r=ROWS-1;r>=0;r--)if(board[r][c]!==-1)board[wr--][c]=board[r][c];for(let r=wr;r>=0;r--)board[r][c]=-1;}newSpawnCells=[];for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++)if(board[r][c]===-1){board[r][c]=Math.floor(Math.random()*COLORS);newSpawnCells.push({r,c});}}
            async function processChain(){let data=findMatches();while(data.matched.size>0){comboCount++;if(comboCount>=2){comboIndicator.textContent='✧ 连消 x'+comboCount+' ✧';comboIndicator.classList.add('show');}const toClear=clearMatchedAndAdjacentGlitch(data.matched);let baseScore=data.matched.size*10+(comboCount-1)*20;if(hasRisk){const rand=Math.random();if(rand<0.2)baseScore*=5;else if(rand>0.95)baseScore=Math.max(0,baseScore-100);}if(allinActive)baseScore*=2;if(hasFilter){let purpleCount=0,normalCount=0;for(const idx of data.matched){const r=Math.floor(idx/COLS),c=idx%COLS;if(board[r][c]>=0&&board[r][c]<COLORS){if(COLOR_CLASSES[board[r][c]]==='purple')purpleCount++;else normalCount++;}}baseScore=normalCount*10+purpleCount*20+(comboCount-1)*20;}if(hasMirror){let mirrorBonus=0;for(const idx of data.matched){const r=Math.floor(idx/COLS),c=idx%COLS;if(board[r][c]>=0&&board[r][c]<COLORS)mirrorBonus+=15;}baseScore+=mirrorBonus;}if(hasVisualGlitch)baseScore=Math.floor(baseScore*1.5);addScore(baseScore);let normalInThisBatch=0;for(const idx of data.matched){if(board[Math.floor(idx/COLS)][idx%COLS]>=0&&board[Math.floor(idx/COLS)][idx%COLS]<COLORS)normalInThisBatch++;}addSwapCounters(normalInThisBatch);document.querySelectorAll('.cell').forEach(c=>{if(toClear.has(parseInt(c.dataset.row)*COLS+parseInt(c.dataset.col)))shatterCell(c);});const delay=Math.max(120,380-comboCount*45);await sleep(delay);for(const idx of toClear)board[Math.floor(idx/COLS)][idx%COLS]=-1;spawnSpecials(data.matchLengths);checkAndSpawnSpecialGen();applyGravityAndSpawn();renderBoard();await sleep(120);data=findMatches();}comboIndicator.classList.remove('show');}
            function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

            // ==================== 初始化 ====================
            initBoard();renderBoard();
        })();
    </script>
